<!DOCTYPE html>
<!--
  ============================================================
  无人机信息管理系统 — 前端入口文件
  ============================================================
  本文件是 Vite 项目的 HTML 入口点。
  开发时由 Vite Dev Server 提供，生产部署时构建为 dist/index.html。
-->
<html lang="zh-CN">
  <head>
    <!-- 字符编码：统一使用 UTF-8，支持中文字符集 -->
    <meta charset="UTF-8" />
    <!-- 视口配置：适配移动端设备，禁止默认缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 页面标题：浏览器标签页显示 -->
    <title>无人机信息管理系统</title>
  </head>
  <body>
    <!--
      Vue 应用挂载点
      Vue 实例将挂载到此 <div id="app"> 节点上，并渲染对应的路由组件。
      初始内容为空，Vue 动态渲染 DOM 结构。
    -->
    <div id="app"></div>
    <!-- 主入口 JS 文件（ES Module 模式） -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
