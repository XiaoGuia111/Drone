<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机管理 - 列表</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { padding-top: 60px; background-color: #f5f5f5; }
        .navbar-brand { font-weight: bold; }
        .table-container { background: #fff; padding: 20px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .search-box { margin-bottom: 20px; }
        .page-header { border-bottom: 2px solid #337ab7; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="/">无人机管理系统</a>
        </div>
        <div id="navbar" class="collapse navbar-collapse">
            <ul class="nav navbar-nav">
                <li class="active"><a href="/">无人机列表</a></li>
                <li><a href="/uav/create">新增无人机</a></li>
            </ul>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#" id="logoutBtn">登出</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h3>无人机信息管理</h3>
    </div>

    <!-- 搜索栏 -->
    <div class="search-box">
        <form class="form-inline" id="searchForm">
            <div class="form-group">
                <input type="text" class="form-control" id="searchName" placeholder="名称">
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="searchModel" placeholder="型号">
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="searchSn" placeholder="序列号">
            </div>
            <div class="form-group">
                <select class="form-control" id="searchStatus">
                    <option value="">全部状态</option>
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="MAINTENANCE">MAINTENANCE</option>
                    <option value="SCRAPPED">SCRAPPED</option>
                </select>
            </div>
            <button type="button" class="btn btn-primary" id="searchBtn">搜索</button>
            <button type="button" class="btn btn-default" id="resetBtn">重置</button>
        </form>
    </div>

    <!-- 数据表格 -->
    <div class="table-container">
        <div class="text-right" style="margin-bottom: 10px;">
            <a href="/uav/create" class="btn btn-success">+ 新增无人机</a>
        </div>
        <table class="table table-bordered table-hover" id="uavTable">
            <thead>
            <tr class="active">
                <th>ID</th>
                <th>名称</th>
                <th>型号</th>
                <th>序列号</th>
                <th>制造商</th>
                <th>状态</th>
                <th>最大高度(m)</th>
                <th>最大速度(km/h)</th>
                <th>重量(kg)</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="uavTableBody">
            </tbody>
        </table>
        <div class="text-center" id="loadingMsg">
            <p class="text-muted">加载中...</p>
        </div>
        <!-- 分页 -->
        <nav aria-label="Page navigation">
            <ul class="pagination" id="pagination">
            </ul>
        </nav>
    </div>
</div>

<!-- 删除确认模态框 -->
<div class="modal fade" id="deleteModal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">确认删除</h4>
            </div>
            <div class="modal-body">
                <p>确定要删除该无人机记录吗？此操作不可恢复。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
<script>
    var currentPage = 1;
    var pageSize = 10;
    var deleteId = null;

    function loadUavs(page) {
        currentPage = page || 1;
        var name = $('#searchName').val();
        var model = $('#searchModel').val();
        var sn = $('#searchSn').val();
        var status = $('#searchStatus').val();

        $('#loadingMsg').show();
        var params = {page: currentPage, size: pageSize};
        if (name) params.name = name;
        if (model) params.model = model;
        if (sn) params.serialNumber = sn;
        if (status) params.status = status;

        $.getJSON('/api/uavs', params, function(res) {
            $('#loadingMsg').hide();
            if (res.code === 200 && res.data) {
                renderTable(res.data.content, res.data.totalElements, res.data.page, res.data.size);
            } else {
                $('#uavTableBody').html('<tr><td colspan="10" class="text-center text-danger">加载失败</td></tr>');
            }
        }).fail(function() {
            $('#loadingMsg').hide();
            $('#uavTableBody').html('<tr><td colspan="10" class="text-center text-danger">请求失败，请检查登录状态</td></tr>');
        });
    }

    function renderTable(records, total, page, size) {
        var tbody = $('#uavTableBody');
        tbody.empty();

        if (!records || records.length === 0) {
            tbody.html('<tr><td colspan="10" class="text-center">暂无数据</td></tr>');
            $('#pagination').empty();
            return;
        }

        $.each(records, function(i, uav) {
            var statusClass = uav.status === 'ACTIVE' ? 'label-success' :
                             uav.status === 'MAINTENANCE' ? 'label-warning' : 'label-danger';
            var row = '<tr>' +
                '<td>' + uav.id + '</td>' +
                '<td>' + encodeHtml(uav.name) + '</td>' +
                '<td>' + encodeHtml(uav.model) + '</td>' +
                '<td>' + encodeHtml(uav.serialNumber) + '</td>' +
                '<td>' + encodeHtml(uav.manufacturer) + '</td>' +
                '<td><span class="label ' + statusClass + '">' + uav.status + '</span></td>' +
                '<td>' + (uav.maxAltitude || '-') + '</td>' +
                '<td>' + (uav.maxSpeed || '-') + '</td>' +
                '<td>' + (uav.weight || '-') + '</td>' +
                '<td>' +
                '  <a href="/uav/edit?id=' + uav.id + '" class="btn btn-xs btn-info">编辑</a> ' +
                '  <button class="btn btn-xs btn-danger" onclick="confirmDelete(' + uav.id + ')">删除</button>' +
                '</td>' +
                '</tr>';
            tbody.append(row);
        });

        renderPagination(total, page, size);
    }

    function renderPagination(total, page, size) {
        var totalPages = Math.ceil(total / size) || 1;
        var pagination = $('#pagination');
        pagination.empty();

        if (totalPages <= 1) return;

        var html = '';
        if (page > 1) {
            html += '<li><a href="#" onclick="loadUavs(' + (page-1) + ')">&laquo;</a></li>';
        }
        for (var i = 1; i <= totalPages; i++) {
            html += '<li class="' + (i === page ? 'active' : '') + '"><a href="#" onclick="loadUavs(' + i + ')">' + i + '</a></li>';
        }
        if (page < totalPages) {
            html += '<li><a href="#" onclick="loadUavs(' + (page+1) + ')">&raquo;</a></li>';
        }
        pagination.html(html);
    }

    function confirmDelete(id) {
        deleteId = id;
        $('#deleteModal').modal('show');
    }

    function encodeHtml(str) {
        if (!str) return '';
        return $('<span>').text(str).html();
    }

    $(function() {
        loadUavs(1);

        $('#searchBtn').click(function() { loadUavs(1); });
        $('#resetBtn').click(function() {
            $('#searchForm')[0].reset();
            loadUavs(1);
        });

        $('#confirmDeleteBtn').click(function() {
            if (deleteId) {
                $.ajax({
                    url: '/api/uavs/' + deleteId,
                    type: 'DELETE',
                    success: function(res) {
                        $('#deleteModal').modal('hide');
                        if (res.code === 200) {
                            loadUavs(currentPage);
                        } else {
                            alert('删除失败: ' + (res.message || '未知错误'));
                        }
                    },
                    error: function() {
                        $('#deleteModal').modal('hide');
                        alert('删除请求失败');
                    }
                });
            }
        });

        $('#logoutBtn').click(function(e) {
            e.preventDefault();
            $.post('/api/auth/logout', function() {
                window.location.href = '/login';
            });
        });
    });
</script>
</body>
</html>
