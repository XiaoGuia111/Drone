<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机管理 - 表单</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <style>
        body { padding-top: 60px; background-color: #f5f5f5; }
        .form-container { background: #fff; padding: 30px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .page-header { border-bottom: 2px solid #337ab7; padding-bottom: 10px; margin-bottom: 20px; }
        .ai-tip { background-color: #d9edf7; border: 1px solid #bce8f1; border-radius: 4px; padding: 10px 15px; margin-bottom: 20px; }
        .required:after { content: " *"; color: red; }
    </style>
</head>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar">
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
                <span class="icon-bar"></span>
            </button>
            <a class="navbar-brand" href="/">无人机管理系统</a>
        </div>
        <div id="navbar" class="collapse navbar-collapse">
            <ul class="nav navbar-nav">
                <li><a href="/">无人机列表</a></li>
                <li class="active"><a id="navTitle" href="#">新增无人机</a></li>
            </ul>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="#" id="logoutBtn">登出</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h3 id="formTitle">新增无人机</h3>
    </div>

    <div class="ai-tip">
        <strong>AI 提示：</strong>输入名称和型号后，点击"AI 自动生成"按钮，系统将自动填充无人机属性。
    </div>

    <div class="form-container">
        <form id="uavForm">
            <input type="hidden" id="uavId" name="id">

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="required" for="name">无人机名称</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="例如：精灵4 Pro" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="required" for="model">型号</label>
                        <input type="text" class="form-control" id="model" name="model" placeholder="例如：PHANTOM-4-PRO" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="required" for="serialNumber">序列号</label>
                        <input type="text" class="form-control" id="serialNumber" name="serialNumber" placeholder="例如：SN-2024-001" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="manufacturer">制造商</label>
                        <input type="text" class="form-control" id="manufacturer" name="manufacturer" placeholder="例如：DJI">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="maxAltitude">最大飞行高度（米）</label>
                        <input type="number" class="form-control" id="maxAltitude" name="maxAltitude" step="0.01" placeholder="例如：5000">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="maxSpeed">最大速度（km/h）</label>
                        <input type="number" class="form-control" id="maxSpeed" name="maxSpeed" step="0.01" placeholder="例如：72">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="weight">重量（kg）</label>
                        <input type="number" class="form-control" id="weight" name="weight" step="0.01" placeholder="例如：1.38">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="manufactureDate">生产日期</label>
                        <input type="date" class="form-control" id="manufactureDate" name="manufactureDate">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="required" for="status">状态</label>
                        <select class="form-control" id="status" name="status" required>
                            <option value="ACTIVE">ACTIVE（运行中）</option>
                            <option value="MAINTENANCE">MAINTENANCE（维护中）</option>
                            <option value="SCRAPPED">SCRAPPED（已报废）</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="description">描述备注</label>
                <textarea class="form-control" id="description" name="description" rows="3" placeholder="无人机的描述信息"></textarea>
            </div>

            <div class="form-group text-center" style="margin-top: 20px;">
                <button type="button" class="btn btn-info" id="aiGenerateBtn">
                    <span class="glyphicon glyphicon-education"></span> AI 自动生成
                </button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="glyphicon glyphicon-floppy-disk"></span> 保存
                </button>
                <a href="/" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
<script>
    var isEditMode = false;

    // AI 自动生成属性
    $('#aiGenerateBtn').click(function() {
        var name = $('#name').val();
        var model = $('#model').val();
        if (!name || !model) {
            alert('请先输入无人机名称和型号');
            return;
        }
        var btn = $(this);
        btn.text('生成中...').prop('disabled', true);

        $.ajax({
            url: '/api/uavs/ai-generate',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({name: name, model: model}),
            success: function(res) {
                if (res.code === 200 && res.data) {
                    var data = res.data;
                    if (data.serialNumber) $('#serialNumber').val(data.serialNumber);
                    if (data.manufacturer) $('#manufacturer').val(data.manufacturer);
                    if (data.maxAltitude) $('#maxAltitude').val(data.maxAltitude);
                    if (data.maxSpeed) $('#maxSpeed').val(data.maxSpeed);
                    if (data.weight) $('#weight').val(data.weight);
                    if (data.manufactureDate) $('#manufactureDate').val(data.manufactureDate);
                    if (data.status) $('#status').val(data.status);
                    if (data.description) $('#description').val(data.description);
                } else {
                    alert('AI 生成失败: ' + (res.message || '未知错误'));
                }
            },
            error: function() {
                alert('AI 生成请求失败');
            },
            complete: function() {
                btn.html('<span class="glyphicon glyphicon-education"></span> AI 自动生成').prop('disabled', false);
            }
        });
    });

    // 判断是否编辑模式
    var urlParams = new URLSearchParams(window.location.search);
    var editId = urlParams.get('id');
    if (editId) {
        isEditMode = true;
        $('#formTitle').text('编辑无人机');
        $('#navTitle').text('编辑无人机');
        $('#submitBtn').html('<span class="glyphicon glyphicon-floppy-disk"></span> 更新');

        $.getJSON('/api/uavs/' + editId, function(res) {
            if (res.code === 200 && res.data) {
                var d = res.data;
                $('#uavId').val(d.id);
                $('#name').val(d.name || '');
                $('#model').val(d.model || '');
                $('#serialNumber').val(d.serialNumber || '');
                $('#manufacturer').val(d.manufacturer || '');
                $('#maxAltitude').val(d.maxAltitude || '');
                $('#maxSpeed').val(d.maxSpeed || '');
                $('#weight').val(d.weight || '');
                $('#manufactureDate').val(d.manufactureDate || '');
                $('#status').val(d.status || 'ACTIVE');
                $('#description').val(d.description || '');
            }
        });
    }

    // 表单提交
    $('#uavForm').submit(function(e) {
        e.preventDefault();
        var formData = {
            id: $('#uavId').val() || null,
            name: $('#name').val(),
            model: $('#model').val(),
            serialNumber: $('#serialNumber').val(),
            manufacturer: $('#manufacturer').val(),
            maxAltitude: $('#maxAltitude').val() ? parseFloat($('#maxAltitude').val()) : null,
            maxSpeed: $('#maxSpeed').val() ? parseFloat($('#maxSpeed').val()) : null,
            weight: $('#weight').val() ? parseFloat($('#weight').val()) : null,
            manufactureDate: $('#manufactureDate').val() || null,
            status: $('#status').val(),
            description: $('#description').val()
        };

        var url = isEditMode ? '/api/uavs/' + editId : '/api/uavs';
        var method = isEditMode ? 'PUT' : 'POST';

        $.ajax({
            url: url,
            type: method,
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function(res) {
                if (res.code === 200) {
                    window.location.href = '/';
                } else {
                    alert('保存失败: ' + (res.message || '未知错误'));
                }
            },
            error: function(xhr) {
                var msg = '保存请求失败';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    msg = resp.message || msg;
                } catch(e) {}
                alert(msg);
            }
        });
    });

    $('#logoutBtn').click(function(e) {
        e.preventDefault();
        $.post('/api/auth/logout', function() {
            window.location.href = '/login';
        });
    });
</script>
</body>
</html>
